# ~/.config/hypr/hyprlock.conf

background {
    path = $HOME/.assets/wallhaven-42eywy.png
    blur_size = 1
    blur_passes = 0
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.6
}

general {
    hide_cursor = false
}
input-field {
    monitor = 
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    fade_on_empty = false
    placeholder_text = Get in the EVA
    
    inner_color = rgba(282828cc)     
    font_color = rgb(5CBD88)
    fail_color = rgb(FF0000)
    outer_color = rgb(BB2A39)
    capslock_color = rgb(FF0000)

    position = 0, -400
    halign = center
    valign = center
}
auth {
	pam:enabled = true
	pam:module = system-local-login
	fingerprint:enabled = false
	fingerprint:ready_message = (󰈷) 
}
label {	
    text = $PAMFAIL
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    position = 0, -180
    halign = center
    valign = center
    color = rgba(200, 200, 200, 1.0)
}

label {
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 50
    position = 0, 400
    halign = center
    valign = center
    color = rgba(FFFFFFCC)
    onclick = mpv --no-video /home/vetula/.assets/audio/NGE.opus
}
# Previous Track
label {
    text = cmd[update:100] echo "󰒮"
    font_family = JetBrainsMono Nerd Font
    font_size = 28

    position = -50, -500
    halign = center
    valign = center

    color = rgba(FFFFFFCC)

    onclick = playerctl previous
}

# Play / Pause
label {
    text = cmd[update:100] playerctl status 2>/dev/null | grep -q Playing && echo "󰏤" || echo "󰐊"
    font_family = JetBrainsMono Nerd Font
    font_size = 32

    position = 0, -500
    halign = center
    valign = center

    color = rgba(5CBD88FF)

    onclick = playerctl play-pause
}

# Next Track
label {
    text = cmd[update:100] echo "󰒭"
    font_family = JetBrainsMono Nerd Font
    font_size = 28

    position = 50, -500
    halign = center
    valign = center

    color = rgba(FFFFFFCC)

    onclick = playerctl next
}
label {
    text = cmd[update:100] $HOME/.scripts/playerctlwrapper.sh title
    font_family = JetBrainsMono Nerd Font
    font_size = 18

    position = 0, -550
    halign = center
    valign = center

    color = rgba(CCCCCCFF)
}
label {
    text = cmd[update:100] $HOME/.scripts/playerctlwrapper.sh artist 
    font_family = JetBrainsMono Nerd Font
    font_size = 18

    position = 0, -580
    halign = center
    valign = center

    color = rgba(CCCCCCFF)
}
label {
    text = cmd[update:1000] echo "󰕿-"
    font_family = JetBrainsMono Nerd Font
    font_size = 26

    position = -90, -500
    halign = center
    valign = center

    color = rgba(FFFFFFCC)

    onclick = swayosd-client --output-volume -5
}
label {
    text = cmd[update:1000] echo "󰕿+"
    font_family = JetBrainsMono Nerd Font
    font_size = 26

    position = 90, -500
    halign = center
    valign = center

    color = rgba(FFFFFFCC)

    onclick = swayosd-client --output-volume +5
}
