bind= $mainMod, mouse_up, exec, swayosd-client --output-volume -5
bind= $mainMod, mouse_down, exec, swayosd-client --output-volume +5
bind = $mainMod, v, exec, cliphist list | $sizedWofi --dmenu  | cliphist decode | wl-copy
bind = $mainMod , Space, global, kando:hypr
bind = CTRL SHIFT, Q , exec, .scripts/commandwrapper.sh "$terminal -o background_opacity=1.0 --class btop -e btop" 
bind = $mainMod ALT, mouse_up, exec, $HOME/.scripts/magnifier.sh - 0.1 
bind = $mainMod ALT, mouse_down , exec, $HOME/.scripts/magnifier.sh + 0.1
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod ALT, 1 , exec, hyprctl keyword cursor:zoom_factor 1
bind = $mainMod ALT, 2 , exec, hyprctl keyword cursor:zoom_factor 2
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec , $HOME/.scripts/logouthyprland.sh 
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, $runmenu
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, exec, firefox
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, F, exec, firefox --private-window
bind = $mainMod, G, plugin:xtd:moveorexec,class:steam,steam
bind = $mainMod SHIFT, g, exec, $HOME/.scripts/cavaembed.sh
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, TAB, layoutmsg,cyclenext tiled
bind = SHIFT ALT, TAB, layoutmsg,cycleprev tiled
bind = $mainMod, RETURN, layoutmsg, swapwithmaster
bind = $mainMod CTRL,1,exec,hyprctl keyword monitor eDP-1,preferred,auto,1.5666667
bind = $mainMod CTRL,2,exec,hyprctl keyword monitor eDP-1,preferred,auto,1
binde=, mouse:276, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ ; swayosd-client --output-volume 0
binde=, mouse:275, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- ; swayosd-client --output-volume 0
bindl=,switch:on:Lid Switch, exec, hyprlock --immediate
bind = $mainMod SHIFT, p, exec, hyprshot -zm region
bind = $mainMod, p, exec, hyprpicker -a
bind = CTRL $mainMod, p, movecursor , 750 500
bind = CTRL $mainMod, p, exec ,hypremoji
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, SPACE, hyprexpo:expo, toggle
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ ; swayosd-client --output-volume 0
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- ; swayosd-client --output-volume 0
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle ; swayosd-client --output-volume 0
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ ; swayosd-client --brightness +0
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- ; swayosd-client --brightness +0
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl previous
bind = $mainMod, I, exec, $HOME/.scripts/togglehypridle.sh
